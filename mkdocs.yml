site_name: Datacenter Infrastructure Curriculum
site_description: A comprehensive hands-on curriculum covering virtualization, networking, storage, and containers
site_url: https://skeptomai.github.io/datacenter-curriculum/
repo_url: https://github.com/skeptomai/datacenter-curriculum
repo_name: skeptomai/datacenter-curriculum
docs_dir: docs

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.path
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.highlight
    - search.share
    - content.code.copy

plugins:
  - search
  - tags

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      linenums_style: pymdownx-inline
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
      title: On this page

